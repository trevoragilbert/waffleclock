<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WaffleClock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFF8F0;
      --text: #3E2723;
      --accent: #F59E0B;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 2rem;
    }

    /* ── Header ── */
    #header {
      text-align: center;
    }

    #header h1 {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--text);
      letter-spacing: 0.04em;
    }

    #header p {
      font-family: 'Lexend', sans-serif;
      font-weight: 400;
      font-size: clamp(0.75rem, 2.8vw, 0.9rem);
      color: var(--text);
      opacity: 0.55;
      margin-top: 0.3rem;
    }

    /* ── App ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    /* ── Waffle icon (flips independently) ── */
    #waffle-container {
      perspective: 800px;
    }

    #waffle-inner {
      backface-visibility: hidden;
    }

    #waffle-inner.flipping {
      animation: flipWaffle 600ms ease-in-out forwards;
    }

    @keyframes flipWaffle {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(360deg); }
    }

    #waffle-icon {
      width: clamp(70px, 20vw, 110px);
      height: clamp(70px, 20vw, 110px);
      display: block;
    }

    /* ── Timer block (static, never animates) ── */
    #timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #phase-label {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      min-height: 1.6em;
      text-align: center;
    }

    #timer-display {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: clamp(4rem, 22vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 0;
      cursor: pointer;
      min-height: 52px;
      min-width: 180px;
      padding: 0 2rem;
    }

    .btn:active { opacity: 0.85; }

    .btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    #action-btn {
      background-color: var(--accent);
      color: var(--text);
    }

    #flip-btn {
      background-color: transparent;
      color: var(--text);
      border: 2px solid var(--text);
      opacity: 0.7;
    }

    #flip-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Counter ── */
    #waffle-count {
      font-family: 'Lexend', sans-serif;
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>WaffleClock</h1>
    <p>Tap Start, flip when it beeps, and collect perfect waffles every time.</p>
  </div>

  <div id="app">
    <div id="waffle-container">
      <div id="waffle-inner">
        <svg id="waffle-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <!-- Grooves: fixed dark base -->
          <rect x="0" y="0" width="100" height="100" rx="6" fill="#3A1A00"/>
          <!-- 4 big raised cells — fill animated by JS -->
          <rect class="waffle-cell" x="4"  y="4"  width="43" height="43" fill="#F5E6C8"/>
          <rect class="waffle-cell" x="53" y="4"  width="43" height="43" fill="#F5E6C8"/>
          <rect class="waffle-cell" x="4"  y="53" width="43" height="43" fill="#F5E6C8"/>
          <rect class="waffle-cell" x="53" y="53" width="43" height="43" fill="#F5E6C8"/>
          <!-- Inner raised bumps — white highlight overlay -->
          <rect x="12" y="12" width="27" height="27" fill="white" opacity="0.18"/>
          <rect x="61" y="12" width="27" height="27" fill="white" opacity="0.18"/>
          <rect x="12" y="61" width="27" height="27" fill="white" opacity="0.18"/>
          <rect x="61" y="61" width="27" height="27" fill="white" opacity="0.18"/>
        </svg>
      </div>
    </div>

    <div id="timer-block">
      <div id="phase-label">Ready</div>
      <div id="timer-display">1:00</div>
    </div>

    <button id="flip-btn" class="btn hidden">Flip</button>
    <button id="action-btn" class="btn">Start</button>
    <div id="waffle-count">0 waffles</div>
  </div>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────
    const PHASES = { IDLE: 'IDLE', SIDE1: 'SIDE1', WAIT_FLIP: 'WAIT_FLIP', SIDE2: 'SIDE2', DONE: 'DONE' };
    const SIDE1_MS = 60_000;
    const SIDE2_MS = 180_000;
    const TOTAL_COOK_MS = SIDE1_MS + SIDE2_MS;

    // Color: pale batter → deep brown, with t² easing for visible acceleration
    const COLOR_START = { r: 245, g: 230, b: 200 }; // #F5E6C8
    const COLOR_END   = { r: 101, g:  45, b:  10 }; // #652D0A

    // ── State ────────────────────────────────────────────────────────────────
    let state = PHASES.IDLE;
    let waffleCount = 0;
    let rafId = null;
    let endTime = 0;
    let cookStartTime = 0;
    let audioCtx = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const body        = document.body;
    const phaseLabel  = document.getElementById('phase-label');
    const timerDisp   = document.getElementById('timer-display');
    const actionBtn   = document.getElementById('action-btn');
    const flipBtn     = document.getElementById('flip-btn');
    const countEl     = document.getElementById('waffle-count');
    const waffleCells = document.querySelectorAll('.waffle-cell');
    const waffleInner = document.getElementById('waffle-inner');

    // ── Audio ─────────────────────────────────────────────────────────────────
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBeep(freq, duration, gain, delay = 0) {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delay);
      gainNode.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + delay + 0.01);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + delay + duration);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + duration + 0.05);
    }

    function playSubtleBeep() {
      ensureAudio();
      playBeep(440, 0.2, 0.3);
    }

    function playLoudBeep() {
      ensureAudio();
      playBeep(600, 0.4, 0.7, 0);
      playBeep(600, 0.4, 0.7, 0.55);
    }

    // ── Timer ─────────────────────────────────────────────────────────────────
    function formatTime(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function stopTimer() {
      if (rafId !== null) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
    }

    function tick() {
      const remaining = endTime - performance.now();
      timerDisp.textContent = formatTime(remaining);
      updateWaffleColor();

      if (remaining <= 0) {
        if (state === PHASES.SIDE1) {
          // Pause and wait for manual flip
          timerDisp.textContent = '0:00';
          setState(PHASES.WAIT_FLIP);
        } else if (state === PHASES.SIDE2) {
          setState(PHASES.DONE);
        }
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function startTimer(durationMs) {
      stopTimer();
      endTime = performance.now() + durationMs;
      rafId = requestAnimationFrame(tick);
    }

    // ── Waffle color ──────────────────────────────────────────────────────────
    function lerpChannel(a, b, t) {
      return Math.round(a + (b - a) * t);
    }

    function updateWaffleColor() {
      if (state !== PHASES.SIDE1 && state !== PHASES.SIDE2 && state !== PHASES.WAIT_FLIP) return;
      const elapsed = performance.now() - cookStartTime;
      const tLinear = Math.min(1, elapsed / TOTAL_COOK_MS);
      const t = tLinear * tLinear; // t² easing — darkens slowly then accelerates
      const r = lerpChannel(COLOR_START.r, COLOR_END.r, t);
      const g = lerpChannel(COLOR_START.g, COLOR_END.g, t);
      const b = lerpChannel(COLOR_START.b, COLOR_END.b, t);
      const color = `rgb(${r},${g},${b})`;
      waffleCells.forEach(el => el.setAttribute('fill', color));
    }

    // ── Flip animation (waffle only) ──────────────────────────────────────────
    function doFlipAnimation(onMidpoint, onComplete) {
      waffleInner.classList.add('flipping');
      setTimeout(onMidpoint, 300);
      waffleInner.addEventListener('animationend', () => {
        waffleInner.classList.remove('flipping');
        onComplete();
      }, { once: true });
    }

    // ── State machine ─────────────────────────────────────────────────────────
    function setState(newPhase) {
      state = newPhase;
      render();

      if (newPhase === PHASES.SIDE1) {
        cookStartTime = performance.now();
        waffleCells.forEach(el => el.setAttribute('fill', '#F5E6C8'));
        startTimer(SIDE1_MS);
      } else if (newPhase === PHASES.DONE) {
        stopTimer();
        playLoudBeep();
        waffleCount++;
        countEl.textContent = `${waffleCount} ${waffleCount === 1 ? 'waffle' : 'waffles'}`;
        timerDisp.textContent = '0:00';
      }
    }

    function render() {
      // Hide both buttons by default, show selectively
      actionBtn.classList.add('hidden');
      flipBtn.classList.add('hidden');

      switch (state) {
        case PHASES.IDLE:
          phaseLabel.textContent = 'Ready';
          timerDisp.textContent = '1:00';
          actionBtn.textContent = 'Start';
          actionBtn.classList.remove('hidden');
          break;
        case PHASES.SIDE1:
          phaseLabel.textContent = 'Side 1';
          break;
        case PHASES.WAIT_FLIP:
          phaseLabel.textContent = 'Flip it!';
          flipBtn.classList.remove('hidden');
          break;
        case PHASES.SIDE2:
          phaseLabel.textContent = 'Side 2';
          break;
        case PHASES.DONE:
          phaseLabel.textContent = 'Done';
          actionBtn.textContent = 'Next Waffle';
          actionBtn.classList.remove('hidden');
          break;
      }
    }

    // ── Buttons ───────────────────────────────────────────────────────────────
    actionBtn.addEventListener('click', () => {
      ensureAudio();
      if (state === PHASES.IDLE || state === PHASES.DONE) {
        setState(PHASES.SIDE1);
      }
    });

    flipBtn.addEventListener('click', () => {
      ensureAudio();
      if (state !== PHASES.WAIT_FLIP) return;
      playSubtleBeep();
      // Animate only the waffle; update labels at midpoint
      doFlipAnimation(
        () => {
          phaseLabel.textContent = 'Side 2';
          timerDisp.textContent = formatTime(SIDE2_MS);
        },
        () => {
          state = PHASES.SIDE2;
          startTimer(SIDE2_MS);
        }
      );
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
