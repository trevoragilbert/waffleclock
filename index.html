<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WaffleClock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #FFF8F0;
      --text: #3E2723;
      --accent: #F59E0B;
    }

    body {
      font-family: 'Lexend', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem 1rem;
      gap: 1.5rem;
    }

    /* ── Header ── */
    #header {
      text-align: center;
    }

    #header h1 {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--text);
      letter-spacing: 0.04em;
    }

    #header p {
      font-family: 'Lexend', sans-serif;
      font-weight: 400;
      font-size: clamp(0.75rem, 2.8vw, 0.9rem);
      color: var(--text);
      opacity: 0.55;
      margin-top: 0.3rem;
    }

    /* ── App ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 400px;
    }

    /* ── Waffle icon (flips independently) ── */
    #waffle-container {
      perspective: 800px;
    }

    #waffle-inner {
      backface-visibility: hidden;
    }

    #waffle-inner.flipping {
      animation: flipWaffle 600ms ease-in-out forwards;
    }

    @keyframes flipWaffle {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(360deg); }
    }

    #waffle-icon {
      width: clamp(70px, 20vw, 110px);
      height: clamp(70px, 20vw, 110px);
      display: block;
    }

    /* ── Timer block ── */
    #timer-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #phase-label {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(1rem, 4vw, 1.4rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      min-height: 1.6em;
      text-align: center;
    }

    #timer-display {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: clamp(4rem, 22vw, 8rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
      text-align: center;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 0;
      cursor: pointer;
      min-height: 52px;
      min-width: 180px;
      padding: 0 2rem;
    }

    .btn:active { opacity: 0.85; }

    .btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    #action-btn {
      background-color: var(--accent);
      color: var(--text);
    }

    #flip-btn {
      background-color: transparent;
      color: var(--text);
      border: 2px solid var(--text);
      opacity: 0.7;
    }

    #flip-btn.hidden {
      visibility: hidden;
      pointer-events: none;
    }

    /* ── Divider ── */
    #divider {
      width: 100%;
      border: none;
      border-top: 1px solid #D4BFA0;
      opacity: 0.5;
    }

    /* ── Plate ── */
    #plate-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    #plate-area.hidden {
      display: none;
    }

    #plate {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #FFFEF5;
      border: 3px solid #D4BFA0;
      position: relative;
      overflow: hidden;
    }

    #plate-waffles {
      position: absolute;
      inset: 0;
    }

    .mini-waffle {
      position: absolute;
      width: 30px;
      height: 30px;
    }

    @keyframes waffleDrop {
      0%   { transform: rotate(var(--rot)) translateY(-18px) scale(0.5); opacity: 0; }
      65%  { transform: rotate(var(--rot)) translateY(3px) scale(1.1); opacity: 1; }
      100% { transform: rotate(var(--rot)) translateY(0) scale(1); opacity: 1; }
    }

    .mini-waffle.dropping {
      animation: waffleDrop 350ms ease-out forwards;
    }

    #waffle-count-label {
      font-family: 'Lexend', sans-serif;
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* ── Summary message ── */
    #summary-msg {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: clamp(1rem, 4vw, 1.3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0.75;
    }

    #summary-msg.hidden { display: none; }

    /* ── Stop button ── */
    #stop-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Lexend', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--text);
      opacity: 0.4;
      text-decoration: underline;
      padding: 0.25rem;
    }

    #stop-btn:active { opacity: 0.25; }

    #stop-btn.hidden { display: none; }

    /* ── Settings button ── */
    #settings-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.25rem;
      opacity: 0.4;
      color: var(--text);
      line-height: 0;
    }

    #settings-btn:hover { opacity: 0.7; }

    /* ── Settings modal ── */
    #settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(62, 39, 35, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #settings-overlay.hidden { display: none; }

    #settings-modal {
      background: var(--bg);
      padding: 2rem;
      width: min(90vw, 320px);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    #settings-modal h2 {
      font-family: 'Lexend', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #settings-close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      color: var(--text);
      opacity: 0.5;
      padding: 0.25rem;
    }

    #settings-close:hover { opacity: 1; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .setting-row label {
      font-family: 'Lexend', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
    }

    .time-inputs input {
      width: 3rem;
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      background: none;
      border: 1px solid #D4BFA0;
      color: var(--text);
      padding: 0.25rem;
      border-radius: 0;
      -moz-appearance: textfield;
    }

    .time-inputs input::-webkit-outer-spin-button,
    .time-inputs input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #D4BFA0;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: white;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* ── Credit ── */
    #credit {
      font-family: 'Lexend', sans-serif;
      font-size: 0.65rem;
      opacity: 0.4;
      text-align: center;
      line-height: 1.6;
    }

    #credit a {
      color: inherit;
    }
  </style>
</head>

          <input type="checkbox" id="plate-anim-toggle" checked>
          <span class="toggle-slider"></span>

  <p id="credit">Waffle by Yeong Rong Kim from <a href="https://thenounproject.com/browse/icons/term/waffle/" target="_blank" title="Waffle Icons">Noun Project</a> (CC BY 3.0) &nbsp;·&nbsp; <a href="https://cooking.nytimes.com/recipes/1017409-waffles" target="_blank">Favorite recipe</a></p>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────
    const PHASES = { IDLE: 'IDLE', SIDE1: 'SIDE1', WAIT_FLIP: 'WAIT_FLIP', SIDE2: 'SIDE2', DONE: 'DONE', SUMMARY: 'SUMMARY' };
    let side1Ms = 60_000;
    let side2Ms = 180_000;
    let plateAnimEnabled = true;

    const COLOR_START = { r: 248, g: 250, b: 220 }; // #F8FADC
    const COLOR_END   = { r: 228, g: 188, b: 128 }; // #E4BC80

    function totalCookMs() { return side1Ms + side2Ms; }

    // ── State ────────────────────────────────────────────────────────────────
    let state = PHASES.IDLE;
    let waffleCount = 0;
    let rafId = null;
    let endTime = 0;
    let cookStartTime = 0;
    let audioCtx = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const body           = document.body;
    const phaseLabel     = document.getElementById('phase-label');
    const timerDisp      = document.getElementById('timer-display');
    const actionBtn      = document.getElementById('action-btn');
    const flipBtn        = document.getElementById('flip-btn');
    const stopBtn        = document.getElementById('stop-btn');
    const countLabel     = document.getElementById('waffle-count-label');
    const plateArea      = document.getElementById('plate-area');
    const plateWaffles   = document.getElementById('plate-waffles');
    const summaryMsg     = document.getElementById('summary-msg');
    const waffleGroup    = document.getElementById('waffle-paths');
    const waffleInner    = document.getElementById('waffle-inner');
    const waffleContainer = document.getElementById('waffle-container');
    const timerBlock     = document.getElementById('timer-block');

    // ── Audio ─────────────────────────────────────────────────────────────────
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBeep(freq, duration, gain, delay = 0) {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime + delay);
      gainNode.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + delay + 0.01);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + delay + duration);
      osc.start(audioCtx.currentTime + delay);
      osc.stop(audioCtx.currentTime + delay + duration + 0.05);
    }

    function playSubtleBeep() { ensureAudio(); playBeep(440, 0.2, 0.3); }
    function playLoudBeep()   { ensureAudio(); playBeep(600, 0.4, 0.7, 0); playBeep(600, 0.4, 0.7, 0.55); }

    // ── Timer ─────────────────────────────────────────────────────────────────
    function formatTime(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function stopTimer() {
      if (rafId !== null) { cancelAnimationFrame(rafId); rafId = null; }
    }

    function tick() {
      const remaining = endTime - performance.now();
      timerDisp.textContent = formatTime(remaining);
      updateWaffleColor();
      if (remaining <= 0) {
        if (state === PHASES.SIDE1) {
          timerDisp.textContent = '0:00';
          setState(PHASES.WAIT_FLIP);
        } else if (state === PHASES.SIDE2) {
          setState(PHASES.DONE);
        }
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function startTimer(durationMs) {
      stopTimer();
      endTime = performance.now() + durationMs;
      rafId = requestAnimationFrame(tick);
    }

    // ── Waffle color ──────────────────────────────────────────────────────────
    function lerpChannel(a, b, t) { return Math.round(a + (b - a) * t); }

    function updateWaffleColor() {
      if (state !== PHASES.SIDE1 && state !== PHASES.SIDE2 && state !== PHASES.WAIT_FLIP) return;
      const elapsed = performance.now() - cookStartTime;
      const tLinear = Math.min(1, elapsed / totalCookMs());
      const t = tLinear * tLinear;
      const r = lerpChannel(COLOR_START.r, COLOR_END.r, t);
      const g = lerpChannel(COLOR_START.g, COLOR_END.g, t);
      const b = lerpChannel(COLOR_START.b, COLOR_END.b, t);
      waffleGroup.setAttribute('fill', `rgb(${r},${g},${b})`);
    }

    // ── Flip animation ────────────────────────────────────────────────────────
    function doFlipAnimation(onMidpoint, onComplete) {
      waffleInner.classList.add('flipping');
      setTimeout(onMidpoint, 300);
      waffleInner.addEventListener('animationend', () => {
        waffleInner.classList.remove('flipping');
        onComplete();
      }, { once: true });
    }

    // ── Plate ─────────────────────────────────────────────────────────────────

    function makeMiniWaffle() {
      const wrap = document.createElement('div');
      wrap.className = 'mini-waffle';
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('width', '30');
      svg.setAttribute('height', '30');
      svg.innerHTML = WAFFLE_PATHS;
      wrap.appendChild(svg);
      return wrap;
    }

    function addWaffleToPlate() {
      const el = makeMiniWaffle();
      // Random position within plate circle (plate is 150px, mini is 30px)
      const angle = Math.random() * 2 * Math.PI;
      const dist  = Math.sqrt(Math.random()) * 48;
      const cx = 75 + dist * Math.cos(angle);
      const cy = 75 + dist * Math.sin(angle);
      el.style.left = (cx - 15) + 'px';
      el.style.top  = (cy - 15) + 'px';
      const rot = (Math.random() * 40 - 20).toFixed(1);
      el.style.setProperty('--rot', rot + 'deg');
      if (plateAnimEnabled) el.classList.add('dropping');
      el.addEventListener('animationend', () => {
        el.style.transform = `rotate(${rot}deg)`;
        el.classList.remove('dropping');
      }, { once: true });
      plateWaffles.appendChild(el);
    }

    function updateCountLabel() {
      countLabel.textContent = `${waffleCount} ${waffleCount === 1 ? 'waffle' : 'waffles'}`;
    }

    // ── State machine ─────────────────────────────────────────────────────────
    function setState(newPhase) {
      state = newPhase;
      render();

      if (newPhase === PHASES.SIDE1) {
        cookStartTime = performance.now();
        waffleGroup.setAttribute('fill', '#F8FADC');
        startTimer(side1Ms);
      } else if (newPhase === PHASES.DONE) {
        stopTimer();
        playLoudBeep();
        waffleCount++;
        updateCountLabel();
        addWaffleToPlate();
        timerDisp.textContent = '0:00';
      } else if (newPhase === PHASES.SUMMARY) {
        stopTimer();
      }
    }

    function render() {
      actionBtn.classList.add('hidden');
      flipBtn.classList.add('hidden');

      const inSession = state !== PHASES.IDLE && state !== PHASES.SUMMARY;
      stopBtn.classList.toggle('hidden', !inSession);

      const isSummary = state === PHASES.SUMMARY;
      waffleContainer.style.display = isSummary ? 'none' : '';
      timerBlock.style.display      = isSummary ? 'none' : '';
      summaryMsg.classList.toggle('hidden', !isSummary);
      plateArea.classList.toggle('hidden', isSummary && waffleCount === 0);

      switch (state) {
        case PHASES.IDLE:
          phaseLabel.textContent = 'Ready';
          timerDisp.textContent = '1:00';
          actionBtn.textContent = 'Start';
          actionBtn.classList.remove('hidden');
          break;
        case PHASES.SIDE1:
          phaseLabel.textContent = 'Side 1';
          flipBtn.classList.remove('hidden');
          break;
        case PHASES.WAIT_FLIP:
          phaseLabel.textContent = 'Flip it!';
          flipBtn.classList.remove('hidden');
          break;
        case PHASES.SIDE2:
          phaseLabel.textContent = 'Side 2';
          actionBtn.textContent = 'Remove and Heat Iron';
          actionBtn.classList.remove('hidden');
          break;
        case PHASES.DONE:
          phaseLabel.textContent = 'Done';
          actionBtn.textContent = 'Start Waffle';
          actionBtn.classList.remove('hidden');
          break;
        case PHASES.SUMMARY:
          summaryMsg.textContent = waffleCount === 0
            ? 'No waffles yet.'
            : `${waffleCount} ${waffleCount === 1 ? 'waffle' : 'waffles'} cooked.`;
          actionBtn.textContent = 'Start Over';
          actionBtn.classList.remove('hidden');
          break;
      }
    }

    // ── Buttons ───────────────────────────────────────────────────────────────
    actionBtn.addEventListener('click', () => {
      ensureAudio();
      if (state === PHASES.IDLE || state === PHASES.DONE) {
        setState(PHASES.SIDE1);
      } else if (state === PHASES.SIDE2) {
        setState(PHASES.DONE);
      } else if (state === PHASES.SUMMARY) {
        // Reset everything
        waffleCount = 0;
        updateCountLabel();
        plateWaffles.innerHTML = '';
        waffleGroup.setAttribute('fill', '#F8FADC');
        setState(PHASES.IDLE);
      }
    });

    flipBtn.addEventListener('click', () => {
      ensureAudio();
      if (state !== PHASES.WAIT_FLIP && state !== PHASES.SIDE1) return;
      stopTimer();
      playSubtleBeep();
      doFlipAnimation(
        () => {
          phaseLabel.textContent = 'Side 2';
          timerDisp.textContent = formatTime(side2Ms);
        },
        () => {
          state = PHASES.SIDE2;
          startTimer(side2Ms);
        }
      );
    });

    stopBtn.addEventListener('click', () => {
      ensureAudio();
      setState(PHASES.SUMMARY);
    });

    // ── Settings ─────────────────────────────────────────────────────────────
    const settingsBtn     = document.getElementById('settings-btn');
    const settingsOverlay = document.getElementById('settings-overlay');
    const settingsClose   = document.getElementById('settings-close');
    const s1MinInput      = document.getElementById('s1-min');
    const s1SecInput      = document.getElementById('s1-sec');
    const s2MinInput      = document.getElementById('s2-min');
    const s2SecInput      = document.getElementById('s2-sec');
    const plateAnimToggle = document.getElementById('plate-anim-toggle');

    function openSettings() {
      const s1 = Math.round(side1Ms / 1000);
      const s2 = Math.round(side2Ms / 1000);
      s1MinInput.value = Math.floor(s1 / 60);
      s1SecInput.value = String(s1 % 60).padStart(2, '0');
      s2MinInput.value = Math.floor(s2 / 60);
      s2SecInput.value = String(s2 % 60).padStart(2, '0');
      plateAnimToggle.checked = plateAnimEnabled;
      settingsOverlay.classList.remove('hidden');
    }

    function closeSettings() {
      const s1 = (parseInt(s1MinInput.value) || 0) * 60 + (parseInt(s1SecInput.value) || 0);
      const s2 = (parseInt(s2MinInput.value) || 0) * 60 + (parseInt(s2SecInput.value) || 0);
      if (s1 > 0) side1Ms = s1 * 1000;
      if (s2 > 0) side2Ms = s2 * 1000;
      plateAnimEnabled = plateAnimToggle.checked;
      settingsOverlay.classList.add('hidden');
    }

    settingsBtn.addEventListener('click', openSettings);
    settingsClose.addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', e => { if (e.target === settingsOverlay) closeSettings(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSettings(); });

    // ── Init ──────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
